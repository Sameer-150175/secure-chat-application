services:
  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      - JWT_SECRET=change-this-in-production
      - CLIENT_ORIGIN=http://localhost:5173
  client:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
    environment:
      - VITE_API_URL=http://localhost:4000
